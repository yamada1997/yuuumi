services:
  - type: web
    name: casestudy-tool
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: APP_PASSWORD
        sync: false
      - key: NODE_ENV
        value: production
